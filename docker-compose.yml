services:
  nexura:
    build: .
    container_name: nexura-scanner
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - reports:/app/BACKEND/reports
      - models:/app/LOCAL_AI_MODELS
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/api/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  n8n:
    image: n8nio/n8n:latest
    container_name: nexura-n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_PORT=5678
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_SECURE_COOKIE=false
      - NEXURA_API_URL=http://nexura:8080
      - NEXURA_API_KEY=${NEXURA_API_KEY:-}
    env_file:
      - .env
    depends_on:
      nexura:
        condition: service_healthy

volumes:
  reports:
  models:
  n8n_data:
