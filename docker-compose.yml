services:
  nexura:
    build: .
    container_name: nexura-scanner
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - reports:/app/reports
      - models:/app/LOCAL_AI_MODELS
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/api/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  reports:
  models: